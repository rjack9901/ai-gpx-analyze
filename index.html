<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPX 運動表現數據中心</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .gradient-bg { background: linear-gradient(135deg, #020617 0%, #0f172a 100%); }
        .card { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.06); }
        .chart-container { position: relative; height: 350px; width: 100%; }
        .btn-primary { background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%); }
        .btn-ai { background: linear-gradient(135deg, #10b981 0%, #059669 100%); }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
    </style>
</head>
<body class="gradient-bg min-h-screen text-slate-200 font-sans">

    <!-- Header -->
    <div class="max-w-6xl mx-auto p-4 md:p-8">
        <header class="mb-10 flex flex-col md:flex-row justify-between items-center gap-6 text-center md:text-left">
            <div>
                <h1 class="text-4xl font-black text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-emerald-400">GPX 數據中心</h1>
                <p class="text-slate-500 text-xs tracking-[0.2em] uppercase mt-1 font-bold">Professional Sports Analytics</p>
            </div>
            <div id="aiShortcuts" class="hidden flex gap-3">
                <button onclick="copyDataForAI()" class="btn-ai text-white px-6 py-3 rounded-2xl font-bold text-sm shadow-lg shadow-emerald-500/20 hover:scale-105 transition-all flex items-center gap-2">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3"></path></svg>
                    複製 AI 分析指令
                </button>
                <a href="https://gemini.google.com/" target="_blank" class="bg-white/10 hover:bg-white/20 px-6 py-3 rounded-2xl font-bold text-sm transition-all flex items-center gap-2">
                    前往 Gemini 網頁版
                </a>
            </div>
        </header>

        <!-- Upload Zone -->
        <div id="uploadZone" class="card p-12 rounded-3xl mb-10 text-center border-dashed border-2 border-slate-700 hover:border-blue-500/50 transition-all cursor-pointer group">
            <input type="file" id="gpxInput" accept=".gpx" class="hidden">
            <label for="gpxInput" class="cursor-pointer block">
                <div class="w-16 h-16 bg-blue-500/10 rounded-2xl flex items-center justify-center mx-auto mb-6 group-hover:scale-110 transition-transform">
                    <svg class="w-8 h-8 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 13h6m-3-3v6m5 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
                    </svg>
                </div>
                <h2 class="text-xl font-bold text-slate-200">上傳 GPX 檔案進行分析</h2>
                <p class="text-slate-500 text-sm mt-2 font-medium">匯入數據後，即可複製數據發送給 Gemini AI 教練</p>
            </label>
        </div>

        <div id="results" class="hidden space-y-8 animate-in slide-in-from-bottom-6 duration-700">
            <!-- Summary Dashboard -->
            <div class="grid grid-cols-2 lg:grid-cols-4 gap-4" id="summary"></div>

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                <!-- Data Visualization -->
                <div class="lg:col-span-2 space-y-8">
                    <!-- Chart -->
                    <div class="card p-8 rounded-3xl shadow-xl">
                        <div class="flex justify-between items-center mb-8">
                            <h2 class="text-lg font-bold flex items-center">
                                <span class="w-1.5 h-6 bg-blue-500 rounded-full mr-3"></span>數據分佈趨勢
                            </h2>
                            <div class="flex gap-4 text-[10px] uppercase font-black text-slate-500">
                                <span class="flex items-center gap-2"><span class="w-2.5 h-2.5 bg-blue-400 rounded-full"></span> 配速</span>
                                <span class="flex items-center gap-2"><span class="w-2.5 h-2.5 bg-red-400 rounded-full"></span> 心率</span>
                            </div>
                        </div>
                        <div class="chart-container">
                            <canvas id="mainChart"></canvas>
                        </div>
                    </div>

                    <!-- Lap Table -->
                    <div class="card p-8 rounded-3xl shadow-xl">
                        <h2 class="text-lg font-bold mb-8 flex items-center">
                            <span class="w-1.5 h-6 bg-emerald-500 rounded-full mr-3"></span>每公里分圈詳情
                        </h2>
                        <div class="overflow-x-auto">
                            <table class="w-full text-left text-sm">
                                <thead class="text-slate-500 font-bold uppercase tracking-widest text-[10px]">
                                    <tr class="border-b border-slate-800">
                                        <th class="pb-5 px-3">圈數</th>
                                        <th class="pb-5 px-3">平均配速</th>
                                        <th class="pb-5 px-3">平均心率</th>
                                        <th class="pb-5 px-3">平均步頻</th>
                                    </tr>
                                </thead>
                                <tbody id="lapBody" class="font-medium"></tbody>
                            </table>
                        </div>
                    </div>
                </div>

                <!-- AI Instructions Sidebar -->
                <div class="space-y-6">
                    <div class="card p-8 rounded-3xl border-t-4 border-emerald-500 shadow-2xl sticky top-8">
                        <h2 class="text-xl font-black text-white mb-6">Gemini AI 分析指引</h2>
                        <div class="space-y-6 text-sm text-slate-400 leading-relaxed">
                            <div class="flex gap-4">
                                <div class="w-6 h-6 rounded-full bg-emerald-500/20 text-emerald-400 flex items-center justify-center font-bold text-xs flex-shrink-0">1</div>
                                <p>匯入您的 GPX 檔案，系統會自動處理分圈與心率數據。</p>
                            </div>
                            <div class="flex gap-4">
                                <div class="w-6 h-6 rounded-full bg-emerald-500/20 text-emerald-400 flex items-center justify-center font-bold text-xs flex-shrink-0">2</div>
                                <p>點擊右上方的「<span class="text-emerald-300 font-bold">複製 AI 分析指令</span>」，我們已為您準備好專業的 Prompt。</p>
                            </div>
                            <div class="flex gap-4">
                                <div class="w-6 h-6 rounded-full bg-emerald-500/20 text-emerald-400 flex items-center justify-center font-bold text-xs flex-shrink-0">3</div>
                                <p>打開 Gemini 網頁版，將指令貼上並送出。AI 教練將為您進行深度解讀。</p>
                            </div>
                            
                            <hr class="border-slate-800">
                            
                            <div class="p-4 bg-white/5 rounded-2xl text-[11px] italic">
                                💡 提示：使用網頁版 Gemini 可以獲得更人性化的教練建議，且不受 API 額度限制。
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let mainChart = null;
        let globalData = null;

        document.getElementById('gpxInput').addEventListener('change', e => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = evt => analyzeGPX(evt.target.result);
                reader.readAsText(file);
            }
        });

        // 多標籤數據抓取輔助函數
        function getVal(node, tags) {
            for (let tag of tags) {
                const el = node.getElementsByTagName(tag)[0] || 
                           node.getElementsByTagName('gpxtpx:' + tag)[0] || 
                           node.getElementsByTagName('gpxdata:' + tag)[0];
                if (el && el.textContent) return el.textContent;
            }
            return null;
        }

        async function analyzeGPX(xmlText) {
            const parser = new DOMParser();
            const xmlDoc = parser.parseFromString(xmlText, "text/xml");
            const trkpts = Array.from(xmlDoc.getElementsByTagName('trkpt'));
            
            if (trkpts.length === 0) return alert("無效的 GPX 檔案數據。");

            const points = trkpts.map(pt => {
                const extensions = pt.getElementsByTagName('extensions')[0];
                const hr = parseInt(getVal(pt, ['hr']) || (extensions ? getVal(extensions, ['hr', 'value']) : null) || 0);
                const cad = parseInt(getVal(pt, ['cadence', 'cad']) || (extensions ? getVal(extensions, ['cadence', 'cad']) : null) || 0);
                const dist = parseFloat(getVal(pt, ['distance']) || (extensions ? getVal(extensions, ['distance']) : null) || 0);

                return {
                    time: new Date(pt.getElementsByTagName('time')[0]?.textContent),
                    hr: hr, cad: cad, dist: dist
                };
            });

            processData(points);
        }

        function processData(points) {
            let laps = [];
            let lastIdx = 0;
            let target = 1000;
            const chartPoints = { d: [], h: [], c: [], p: [] };

            points.forEach((p, i) => {
                if (i % 15 === 0) {
                    chartPoints.d.push((p.dist/1000).toFixed(2));
                    chartPoints.h.push(p.hr);
                    if (i > 30) {
                        const prev = points[i-30];
                        const dt = (p.time - prev.time)/1000;
                        const dd = p.dist - prev.dist;
                        chartPoints.p.push(dd > 0 ? (dt/(dd/1000)/60) : null);
                    } else chartPoints.p.push(null);
                }

                if (p.dist >= target || i === points.length - 1) {
                    const start = points[lastIdx];
                    const dur = (p.time - start.time)/1000;
                    const dis = p.dist - start.dist;
                    const lPts = points.slice(lastIdx, i + 1);
                    laps.push({
                        lap: laps.length + 1,
                        pace: formatPace(dur/(dis/1000)),
                        hr: (lPts.reduce((a,b)=>a+b.hr,0)/lPts.length).toFixed(0),
                        cad: (lPts.reduce((a,b)=>a+b.cad,0)/lPts.length*2).toFixed(0)
                    });
                    lastIdx = i; target += 1000;
                }
            });

            globalData = { points, laps, chartPoints };
            renderUI();
        }

        function formatPace(s) {
            if (!s || s > 3600 || isNaN(s)) return "--:--";
            return `${Math.floor(s/60)}:${Math.round(s%60).toString().padStart(2,'0')}`;
        }

        function renderUI() {
            document.getElementById('results').classList.remove('hidden');
            document.getElementById('aiShortcuts').classList.remove('hidden');
            const { points, laps, chartPoints } = globalData;
            
            const last = points[points.length-1];
            const first = points[0];
            const totalD = last.dist / 1000;
            const totalT = (last.time - first.time)/1000;
            const avgHR = points.reduce((a,b)=>a+b.hr,0)/points.length;
            
            document.getElementById('summary').innerHTML = `
                <div class="card p-6 rounded-2xl text-center"><p class="text-[10px] text-slate-500 mb-2 uppercase font-black">Distance</p><p class="text-3xl font-black">${totalD.toFixed(2)} km</p></div>
                <div class="card p-6 rounded-2xl text-center"><p class="text-[10px] text-slate-500 mb-2 uppercase font-black">Avg Pace</p><p class="text-3xl font-black">${formatPace(totalT/totalD)}</p></div>
                <div class="card p-6 rounded-2xl text-center border-b-4 border-red-500/20"><p class="text-[10px] text-slate-500 mb-2 uppercase font-black text-red-400">Heart Rate</p><p class="text-3xl font-black text-red-400">${avgHR.toFixed(0)}</p></div>
                <div class="card p-6 rounded-2xl text-center border-b-4 border-emerald-500/20"><p class="text-[10px] text-slate-500 mb-2 uppercase font-black text-emerald-400">Cadence</p><p class="text-3xl font-black text-emerald-400">${(points.reduce((a,b)=>a+b.cad,0)/points.length*2).toFixed(0)}</p></div>
            `;

            document.getElementById('lapBody').innerHTML = laps.map(l => `
                <tr class="border-b border-slate-900/50 hover:bg-white/5 transition-colors">
                    <td class="py-4 px-3 font-bold text-slate-600">${l.lap}</td>
                    <td class="py-4 px-3 text-blue-400 font-mono font-black">${l.pace}</td>
                    <td class="py-4 px-3 text-slate-300 font-bold">${l.hr}</td>
                    <td class="py-4 px-3 text-slate-300 font-bold">${l.cad}</td>
                </tr>
            `).join('');

            initChart(chartPoints);
        }

        function initChart(data) {
            const ctx = document.getElementById('mainChart').getContext('2d');
            if (mainChart) mainChart.destroy();
            mainChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: data.d,
                    datasets: [
                        { label: '配速', data: data.p, borderColor: '#60a5fa', yAxisID: 'yP', pointRadius: 0, borderWidth: 3, tension: 0.4 },
                        { label: '心率', data: data.h, borderColor: '#f87171', yAxisID: 'yH', pointRadius: 0, borderWidth: 3, tension: 0.4 }
                    ]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    interaction: { mode: 'index', intersect: false },
                    scales: {
                        yP: { reverse: true, min: 3, max: 12, position: 'left', grid: { display: false }, ticks: { color: '#60a5fa' } },
                        yH: { min: 80, max: 200, position: 'right', grid: { color: 'rgba(255,255,255,0.03)' }, ticks: { color: '#f87171' } },
                        x: { grid: { display: false } }
                    },
                    plugins: { legend: { display: false } }
                }
            });
        }

        function copyDataForAI() {
            if (!globalData) return alert("請先匯入數據檔案。");

            const totalD = (globalData.points[globalData.points.length-1].dist / 1000).toFixed(2);
            const prompt = `您是一位專業的馬拉松與跑步教練。請根據我匯入的 10 公里跑步數據，為我提供專業的技術分析與訓練建議。
            
數據概覽：
- 總距離：${totalD} km
- 平均心率：${(globalData.points.reduce((a,b)=>a+b.hr,0)/globalData.points.length).toFixed(0)} bpm
- 平均步頻：${(globalData.points.reduce((a,b)=>a+b.cad,0)/globalData.points.length*2).toFixed(0)} spm

分圈詳情 (每公里)：
${globalData.laps.map(l => `第 ${l.lap} 圈: 配速 ${l.pace}, 平均心率 ${l.hr}, 平均步頻 ${l.cad}`).join('\n')}

請針對以下重點進行解讀：
1. 配速穩定度與分段策略 (Splits)：我是先快後慢還是先慢後快？這代表什麼？
2. 有氧效率：分析我的心率與配速關係，是否有明顯的心率漂移 (Cardiac Drift)？
3. 技術改進：步頻是否合理？
4. 行動方案：請給我 3 個具體的訓練目標以優化下一次表現。

請使用繁體中文，以專業教練的口吻回答，並使用 Markdown 格式讓報告易於閱讀。`;

            navigator.clipboard.writeText(prompt).then(() => {
                alert("教練指令已複製到剪貼簿！請現在開啟 Gemini 網頁版並貼上。");
            });
        }
    </script>
</body>
</html>
